<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أجمل حكاية | 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --glass-strong: rgba(255, 255, 255, 0.3);
            --text-main: #ffffff;
            --shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            color: var(--text-main);
            overflow: hidden;
            position: relative;
            padding: 16px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.05);
            z-index: 1;
        }

        .heart-particle {
            position: absolute;
            color: #ffffff;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            z-index: 0;
            animation: floatAndFade 5s linear forwards;
        }

        @keyframes floatAndFade {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.3) rotate(360deg); opacity: 0; }
        }

        .main-card {
            position: relative;
            z-index: 2;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-strong);
            border-radius: 40px; 
            padding: 40px 20px; 
            text-align: center;
            box-shadow: var(--shadow);
            max-width: 650px; 
            width: 90%;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 2.2rem; 
            margin-bottom: 5px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .status-pill {
            display: inline-block;
            margin-bottom: 16px;
            font-size: 0.92rem;
            background: rgba(255, 255, 255, 0.24);
            border: 1px solid rgba(255, 255, 255, 0.32);
            border-radius: 999px;
            padding: 8px 14px;
        }

        .timer-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .time-unit {
            background: rgba(255, 255, 255, 0.25);
            padding: 15px 5px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            min-width: 80px;
            flex: 1 1 85px;
            display: none; 
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .time-unit:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.35);
        }

        .time-unit:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.5);
        }

        .bounce-effect {
            animation: cardBounce 0.5s ease;
        }

        @keyframes cardBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .number {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .label { font-size: 0.8rem; }

        #dynamic-message {
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 1.5em;
            color: #fff;
        }

        .hint {
            margin-top: 8px;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .music-player {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            border-radius: 50px;
            display: inline-flex;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        audio { height: 30px; width: 200px; filter: brightness(1.5); }

        footer { margin-top: 25px; font-size: 1.1rem; }
        .heart { color: #ff4d4d; display: inline-block; animation: beat 0.8s infinite alternate; }
        @keyframes beat { to { transform: scale(1.4); } }

        @media (max-width: 600px) {
            .main-card {
                border-radius: 28px;
                padding: 28px 14px;
                width: 95%;
            }

            h1 { font-size: 1.75rem; }
            .subtitle { font-size: 1rem; }
            .number { font-size: 1.45rem; }
            .time-unit { min-width: 72px; }
            audio { width: 175px; }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="main-card">
        <h1>🌙 حكايتنا بدأت</h1>
        <p class="subtitle">💖 8/11/2025</p>
        <p class="status-pill" id="statusText">⌛ جاري الحساب...</p>

        <div class="timer-grid" id="timerContainer">
            <div class="time-unit" id="unit-years" onclick="applyEffect(this)"><span class="number" id="years">0</span><span class="label">سنة</span></div>
            <div class="time-unit" id="unit-months" onclick="applyEffect(this)"><span class="number" id="months">0</span><span class="label">شهر</span></div>
            <div class="time-unit" id="unit-days" onclick="applyEffect(this)"><span class="number" id="days">0</span><span class="label">يوم</span></div>
            <div class="time-unit" id="unit-hours" onclick="applyEffect(this)"><span class="number" id="hours">0</span><span class="label">ساعة</span></div>
            <div class="time-unit" id="unit-minutes" onclick="applyEffect(this)"><span class="number" id="minutes">0</span><span class="label">دقيقة</span></div>
            <div class="time-unit" id="unit-seconds" style="display: block;" onclick="applyEffect(this)"><span class="number" id="seconds">0</span><span class="label">ثانية</span></div>
        </div>

        <div id="dynamic-message"></div>
        <p class="hint">المربعات قابلة للمس لإضافة لمسة قلوب 💞</p>

        <div class="music-player">
            <audio controls autoplay loop>
                <source src="music.mp3" type="audio/mpeg">
            </audio>
        </div>

        <footer>ربنا يكتبك ليا <span class="heart">❤</span></footer>
    </div>

    <script>
        const startDate = new Date("November 8, 2025 00:00:00");
        
        const messages = [
            "كل ثانية معاكي حياة جديدة...",
            "أجمل صدفة في عمري كله ❤️",
            "وجودك هو الأمان بالنسبة لي",
            "نفسي نكبر سوا ونعجز سوا",
            "كل يوم بحبك أكتر من اللي قبله",
            "أنتي الحلم اللي مكنتش عاوز أصحى منه ❤️❤️"
        ];

        function setRandomMessage() {
            const msgEl = document.getElementById('dynamic-message');
            const randomIndex = Math.floor(Math.random() * messages.length);
            msgEl.innerText = messages[randomIndex];
        }

        function updateTimer() {
            const now = new Date();
            const statusText = document.getElementById("statusText");
            const isBeforeStart = now < startDate;
            statusText.innerText = isBeforeStart ? "⏳ فاضل على البداية" : "💗 مرّ على بدايتنا";

            const base = isBeforeStart ? now : startDate;
            const target = isBeforeStart ? startDate : now;

            let years = target.getFullYear() - base.getFullYear();
            let months = target.getMonth() - base.getMonth();
            let days = target.getDate() - base.getDate();

            if (days < 0) {
                months--;
                let lastMonth = new Date(target.getFullYear(), target.getMonth(), 0);
                days += lastMonth.getDate();
            }
            if (months < 0) { years--; months += 12; }

            const diffMs = Math.abs(target - base);
            const hours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diffMs % (1000 * 60)) / 1000);

            renderUnit("unit-years", "years", years);
            renderUnit("unit-months", "months", months);
            renderUnit("unit-days", "days", days);
            renderUnit("unit-hours", "hours", hours);
            renderUnit("unit-minutes", "minutes", minutes);
            document.getElementById("seconds").innerText = seconds;
        }

        function renderUnit(elementId, spanId, value) {
            const element = document.getElementById(elementId);
            const span = document.getElementById(spanId);
            if (value > 0 || (elementId === 'unit-months' && parseInt(document.getElementById('years').innerText) > 0)) {
                element.style.display = "block";
                span.innerText = value;
            } else { element.style.display = "none"; }
        }

        function applyEffect(el) {
            el.classList.add('bounce-effect');
            setTimeout(() => el.classList.remove('bounce-effect'), 500);
            for(let i=0; i<5; i++) { createHeartAt(el); }
        }

        function createHeartAt(el) {
            const rect = el.getBoundingClientRect();
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            heart.innerHTML = '❤';
            heart.style.left = (rect.left + rect.width / 2) + 'px';
            heart.style.top = (rect.top + rect.height / 2) + 'px';
            heart.style.animationDuration = '1.5s';
            heart.style.fontSize = '12px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1500);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            heart.innerHTML = '❤'; 
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2.5) + 's';
            heart.style.fontSize = (Math.random() * 15 + 12) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }

        setRandomMessage(); 
        setInterval(createHeart, 300);
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
